<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Provider Tester</title>
  <!-- Element Plus CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@latest/dist/index.css" />
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #f5f7fa;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      margin-bottom: 20px;
    }

    .button-group {
      margin-top: 16px;
    }

    .result-textarea {
      height: 200px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
    }

    .status-success {
      color: #67c23a;
      font-weight: bold;
    }

    .status-fail {
      color: #f56c6c;
      font-weight: bold;
    }

    .table-container {
      background: #fff;
      border-radius: 4px;
      overflow: hidden;
    }
  </style>
  <!-- Vue 3 -->
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <!-- Element Plus -->
  <script src="https://cdn.jsdelivr.net/npm/element-plus@latest/dist/index.full.min.js"></script>
  <!-- Element Plus Icons -->
  <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@latest"></script>
</head>

<body>
  <div id="app" class="container">
    <h1 style="text-align: center; color: #409eff; margin-bottom: 30px;">
      <el-icon style="vertical-align: middle; margin-right: 8px;"><el-connection /></el-icon>
      AI Provider Tester
    </h1>

    <!-- 配置卡片 -->
    <el-card class="card">
      <template #header>
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <span><el-icon><el-setting /></el-icon> 连接配置</span>
          <el-button v-if="urlHistory.length > 0" size="small" type="danger" @click="clearUrlHistory">
            <el-icon><el-delete /></el-icon> 清除历史
          </el-button>
        </div>
      </template>
      <el-form label-width="100px" size="large">
        <el-form-item label="Base URL">
          <el-select v-model="config.baseUrl" placeholder="请选择或输入 Base URL" style="width: 100%;" clearable filterable
            allow-create default-first-option>
            <el-option v-for="url in urlHistory" :key="url" :label="url" :value="url">
              <span style="float: left">{{ url }}</span>
              <span style="float: right; color: #8492a6; font-size: 13px">最近</span>
            </el-option>
          </el-select>
        </el-form-item>
        <el-form-item label="API Key">
          <el-input v-model="config.apiKey" placeholder="sk-xxxx / ms-xxxx" type="password" show-password clearable>
          </el-input>
        </el-form-item>
        <el-form-item>
          <el-button type="primary" @click="fetchModels" :loading="loading.models">
            <el-icon><el-refresh /></el-icon>
            获取模型列表
          </el-button>
        </el-form-item>
      </el-form>
    </el-card>

    <!-- 模型选择卡片 -->
    <el-card class="card" v-if="models.length > 0">
      <template #header>
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <span><el-icon><el-collection /></el-icon> 模型选择</span>
          <el-space>
            <el-button size="small" @click="selectAllModels">全选</el-button>
            <el-button size="small" @click="clearSelection">清空</el-button>
            <el-tag size="small" type="info">已选：{{ selectedModels.length }}</el-tag>
          </el-space>
        </div>
      </template>
      <el-form label-width="100px" size="large">
        <el-form-item label="选择模型">
          <el-select v-model="selectedModels" placeholder="请选择模型（支持多选）" style="width: 100%;" clearable filterable
            multiple collapse-tags collapse-tags-tooltip :max-collapse-tags="5">
            <el-option v-for="model in models" :key="model" :label="model" :value="model" />
          </el-select>
        </el-form-item>
        <el-form-item label="测试 Prompt">
          <el-input v-model="testPrompt" placeholder="请输入测试内容" clearable type="textarea" :rows="2">
            <template #prefix>
              <el-icon><el-chat-dot-round /></el-icon>
            </template>
          </el-input>
        </el-form-item>
        <el-form-item>
          <div class="button-group">
            <el-button type="primary" @click="testSelectedModels" :loading="loading.test"
              :disabled="selectedModels.length === 0">
              <el-icon><el-rocket /></el-icon>
              测试选中的模型 ({{ selectedModels.length }})
            </el-button>
          </div>
        </el-form-item>
      </el-form>
    </el-card>

    <!-- 返回结果卡片 -->
    <el-card class="card" v-if="resultText || testResults.length > 0">
      <template #header>
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <span><el-icon><el-document /></el-icon> 返回结果</span>
          <el-space>
            <el-tag v-if="testResults.length > 0" type="success">
              平均耗时：{{ avgTime }} ms
            </el-tag>
            <el-button size="small" @click="exportResults" :disabled="testResults.length === 0">
              <el-icon><el-download /></el-icon> 导出 JSON
            </el-button>
            <el-button size="small" type="danger" @click="clearResults" :disabled="testResults.length === 0">
              <el-icon><el-delete /></el-icon> 清除
            </el-button>
          </el-space>
        </div>
      </template>
      <el-input v-model="resultText" type="textarea" class="result-textarea" readonly placeholder="测试结果将显示在这里..." />
    </el-card>

    <!-- 结果表格卡片 -->
    <el-card class="card" v-if="testResults.length > 0">
      <template #header>
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <span><el-icon><el-data-table /></el-icon> 测试结果</span>
          <el-tag :type="successCount > 0 ? 'success' : 'danger'">
            成功：{{ successCount }} / {{ testResults.length }}
          </el-tag>
        </div>
      </template>
      <div class="table-container">
        <el-table :data="testResults" stripe style="width: 100%" size="large">
          <el-table-column label="模型" min-width="150">
            <template #default="{ row }">
              <span style="font-family: 'Consolas', monospace; font-weight: 500;">{{ row.model }}</span>
            </template>
          </el-table-column>
          <el-table-column label="状态" width="100">
            <template #default="{ row }">
              <el-tag :type="row.success ? 'success' : 'danger'">
                {{ row.success ? '成功' : '失败' }}
              </el-tag>
            </template>
          </el-table-column>
          <el-table-column label="耗时 (ms)" width="120" sortable>
            <template #default="{ row }">
              <el-tag effect="plain">{{ row.time }}</el-tag>
            </template>
          </el-table-column>
          <el-table-column label="结果" min-width="300" show-overflow-tooltip>
            <template #default="{ row }">
              {{ row.result }}
            </template>
          </el-table-column>
        </el-table>
      </div>
    </el-card>
  </div>

  <script>
    const { createApp, ref, reactive, computed, onMounted, watch } = Vue;

    const app = createApp({
      setup() {
        const STORAGE_KEY = 'ai-provider-tester-config';
        const MAX_HISTORY = 10;

        const config = reactive({
          baseUrl: '',
          apiKey: ''
        });

        const urlHistory = ref([]);
        const models = ref([]);
        const selectedModels = ref([]);
        const testPrompt = ref('测试连通性');
        const resultText = ref('');
        const testResults = ref([]);

        const loading = reactive({
          models: false,
          test: false
        });

        const successCount = computed(() => {
          return testResults.value.filter(r => r.success).length;
        });

        const avgTime = computed(() => {
          if (testResults.value.length === 0) return 0;
          const total = testResults.value.reduce((sum, r) => sum + r.time, 0);
          return Math.round(total / testResults.value.length);
        });

        // 加载本地存储
        function loadFromStorage() {
          try {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
              const data = JSON.parse(saved);
              if (data.baseUrl) config.baseUrl = data.baseUrl;
              if (data.apiKey) config.apiKey = data.apiKey;
              if (data.urlHistory && Array.isArray(data.urlHistory)) {
                urlHistory.value = data.urlHistory;
              }
            }
          } catch (e) {
            console.error('加载配置失败:', e);
          }
        }

        // 保存到本地存储
        function saveToStorage() {
          try {
            const data = {
              baseUrl: config.baseUrl,
              apiKey: config.apiKey,
              urlHistory: urlHistory.value
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
          } catch (e) {
            console.error('保存配置失败:', e);
          }
        }

        // 添加 URL 到历史记录
        function addUrlHistory(url) {
          if (!url) return;
          // 移除重复项
          const index = urlHistory.value.indexOf(url);
          if (index > -1) {
            urlHistory.value.splice(index, 1);
          }
          // 添加到开头
          urlHistory.value.unshift(url);
          // 限制数量
          if (urlHistory.value.length > MAX_HISTORY) {
            urlHistory.value = urlHistory.value.slice(0, MAX_HISTORY);
          }
          saveToStorage();
        }

        // 清除历史记录
        function clearUrlHistory() {
          urlHistory.value = [];
          saveToStorage();
          ElementPlus.ElMessage.success('历史记录已清除');
        }

        // 监听配置变化自动保存
        watch(() => config.baseUrl, () => {
          if (config.baseUrl) {
            addUrlHistory(config.baseUrl);
          }
        });

        watch(() => config.apiKey, saveToStorage);

        // 组件挂载时加载
        onMounted(() => {
          loadFromStorage();
        });

        async function fetchModels() {
          if (!config.baseUrl || !config.apiKey) {
            ElementPlus.ElMessage.warning('请先填写 Base URL 和 API Key');
            return;
          }

          loading.models = true;
          try {
            const res = await fetch(`${config.baseUrl}/models`, {
              headers: { "Authorization": `Bearer ${config.apiKey}` }
            });

            const data = await res.json();
            models.value = (data.data || []).map(m => m.id);

            if (models.value.length > 0) {
              selectedModels.value = [models.value[0]];
            }

            resultText.value = JSON.stringify(data, null, 2);
            ElementPlus.ElMessage.success(`获取到 ${models.value.length} 个模型`);
          } catch (err) {
            resultText.value = err.toString();
            ElementPlus.ElMessage.error('获取模型列表失败：' + err.message);
          } finally {
            loading.models = false;
          }
        }

        async function callModel(model) {
          const start = Date.now();

          try {
            const res = await fetch(`${config.baseUrl}/chat/completions`, {
              method: 'POST',
              headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${config.apiKey}`
              },
              body: JSON.stringify({
                model: model,
                messages: [{ role: "user", content: testPrompt.value || '测试连通性' }]
              })
            });

            const data = await res.json();
            const time = Date.now() - start;

            return {
              model,
              success: true,
              time,
              result: data.choices?.[0]?.message?.content || "OK"
            };
          } catch (err) {
            return {
              model,
              success: false,
              time: Date.now() - start,
              result: err.toString()
            };
          }
        }

        async function testSelectedModels() {
          if (selectedModels.value.length === 0) {
            ElementPlus.ElMessage.warning('请先选择要测试的模型');
            return;
          }

          loading.test = true;
          testResults.value = [];
          resultText.value = '';

          const allResults = [];
          const concurrency = 3;
          let index = 0;
          const modelsToTest = [...selectedModels.value];

          async function worker() {
            while (index < modelsToTest.length) {
              const current = modelsToTest[index++];
              const res = await callModel(current);
              allResults.push(res);
            }
          }

          const workers = [];
          for (let i = 0; i < concurrency; i++) {
            workers.push(worker());
          }

          await Promise.all(workers);

          // 一次性赋值，确保响应式更新
          testResults.value = allResults;

          // 调试日志
          console.log('测试结果:', testResults.value);

          resultText.value = `全部测试完成 ✅ 成功：${successCount.value} / ${testResults.value.length}`;
          ElementPlus.ElMessage.success(`测试完成！成功：${successCount.value} / ${testResults.value.length}`);
          loading.test = false;
        }

        function selectAllModels() {
          selectedModels.value = [...models.value];
          ElementPlus.ElMessage.success(`已全选 ${models.value.length} 个模型`);
        }

        function clearSelection() {
          selectedModels.value = [];
          ElementPlus.ElMessage.info('已清空选择');
        }

        function exportResults() {
          if (testResults.value.length === 0) {
            ElementPlus.ElMessage.warning('没有可导出的结果');
            return;
          }

          const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
          const filename = `ai-provider-test-${timestamp}`;

          const jsonStr = JSON.stringify(testResults.value, null, 2);
          const blob = new Blob([jsonStr], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${filename}.json`;
          a.click();
          URL.revokeObjectURL(url);
          ElementPlus.ElMessage.success('JSON 导出成功');
        }

        function clearResults() {
          resultText.value = '';
          testResults.value = [];
          ElementPlus.ElMessage.info('结果已清除');
        }

        return {
          config,
          urlHistory,
          models,
          selectedModels,
          testPrompt,
          resultText,
          testResults,
          loading,
          successCount,
          avgTime,
          fetchModels,
          testSelectedModels,
          selectAllModels,
          clearSelection,
          exportResults,
          clearResults,
          clearUrlHistory
        };
      }
    });

    // 注册所有 Element Plus 图标
    for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
      app.component(key, component);
    }

    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>

</html>
